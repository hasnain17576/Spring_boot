spring.application.name=demo

# Use H2 in-memory database by default for local run + quick testing.
# If you want MySQL, uncomment next lines and set your database values.
# spring.datasource.url=jdbc:mysql://localhost:3306/demo_db
# spring.datasource.username=root
# spring.datasource.password=root12345

spring.datasource.url=jdbc:h2:mem:demo_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true